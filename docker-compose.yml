version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: crm-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - crm-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crm-backend
    restart: always
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/crm
      - JWT_SECRET=your_super_secret_jwt_key_for_production
    depends_on:
      - mongodb
    networks:
      - crm-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crm-frontend
    restart: always
    depends_on:
      - backend
    networks:
      - crm-network

  nginx:
    image: nginx:alpine
    container_name: crm-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - crm-network

networks:
  crm-network:
    driver: bridge

volumes:
  mongodb_data:
