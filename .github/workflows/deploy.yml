name: Deploy to Production

on:
  push:
    branches:
      - main # Or master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # This step connects to your VPS/Server via SSH and deploys the new code
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 1. Navigate to your project folder
            cd /mnt/app/crm_anna_studio
            
            # 2. Pull the latest code from GitHub
            git pull origin main
            
            # 3. Rebuild the frontend and backend Docker images with the new code
            docker compose build --no-cache
            
            # 4. Restart the containers in detached mode
            docker compose up -d
